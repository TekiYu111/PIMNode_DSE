//========= Trace Config =========//
//The trace file that should be loaded.
//trace = ./traces/testTrace/tt.out;
trace = /app/PIMNode_DSE_o1/experiments/out_trace_demo/demo_trace.out;
//trace = /home/duhaitao/zSim/traceResult/pim16/pim.out;
//trace = ./traces/trace_pim256/pim-rodiniaBFS_host.out;

//trace = ./traces/guestBFS/pim-rodiniaBFS_pimmmm.out;
//trace = ./traces/noguestBFS/pim-rodiniaBFS_pimmmm.out;

//googleNet trace
//trace = ./traces/googleNet/0_conv1/DRAM_access.txt;
//trace = ./traces/googleNet/1_pool1/DRAM_access.txt;

// Defines the source of the memory traces.
// Use zsim for filtered or unfiltered traces generated with our modified ZSim. 
// Other options are traces generated with a Pin tool or with PISA.
trace_format = zsim; 
// When set to true, pinoSim will open a single trace file, store it in memory, 
// and split the trace file among the number-cores cores according to the core-id in the trace. 
// When set to false, pinoSim will open one trace file per core and read it line-by-line during 
// the simulation (it expects each trace to end with .core_id -- from 0 ... number-cores-1). 
// We strongly suggest to use --split-trace=true because large trace files might lead to memory overload.
split_trace = true;

//========= PIM CORE Config =========//
// When set to true, it enables perfect memory scheduling, 
// where each memory request is placed in the respective vault based on HMC interleaving. 
// When set to false, the requests are scheduled based on the PROCESSOR_ID in each memory trace of the trace file.
disable_per_scheduling = true;
// pimCore type, such as outOrder|inOrder|pimLogic: For simulation of out-of-order or in-order cores.
core_org = pimLogic;
// Number of cores to simulate.
number_cores 	= 1;
banks 		= 1; 
cache = L1L2;
// MHz for speed unit.
cpu_frequency = 800;
early_exit = off;
expected_limit_insts = 0;
//expected_limit_insts = 49956;
// pim_mode: host or pim
pim_mode = pim;
// virtual address translate to physical address
// None, Random, LocalFirst
translation = Random;
// pageSize = 1 << value 
pageSize = 10;
//  555
//========= DRAM Related Config =========//
standard = nDRAM;
unlimit_bandwidth = false;
no_DRAM_latency = false;
channels = 1;
ranks = 1;
nodeBufSize = 1000;
dram_speed = nDRAM_1600H;
dram_org = nDRAM_512Mb_x8;
// some bugs in following code
record_cmd_trace = off;
print_cmd_trace = off;
// address mapping policy
// --RoBaRaCoCh, ChRaBaRoCo
mapping_policy = ChRaBaRoCo;

//========= Guest CPU ===========//
guestCPU = false;
//guestCPU_trace = ./traces/trace/pim-rodiniaBFS.out.guest;

//========= DRAM-POWER =========//
// DRAMPower Module integrated in pinoSim
drampower_SIM = off;
drampower_memspecs = ./memSpecs/nDRAM_800MHz_8bit_A.xml;
// The file to which pinoSim will write the results of the simulator.

//========= Simulkation output =========//
stats_file = pim.stats;

